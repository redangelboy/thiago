<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>STAAR Math Trainer — Grade 5</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --blue:#2563EB;--blue-d:#1D4ED8;--blue-l:#EFF6FF;--blue-m:#BFDBFE;
  --green:#16A34A;--green-d:#166534;--green-l:#F0FDF4;--green-m:#BBF7D0;
  --amber:#D97706;--amber-d:#92400E;--amber-l:#FFFBEB;--amber-m:#FDE68A;
  --red:#DC2626;--red-d:#991B1B;--red-l:#FEF2F2;--red-m:#FECACA;
  --purple:#7C3AED;--purple-d:#5B21B6;--purple-l:#F5F3FF;--purple-m:#DDD6FE;
  --teal:#0D9488;--teal-d:#115E59;--teal-l:#F0FDFA;--teal-m:#99F6E4;
  --g50:#F8FAFC;--g100:#F1F5F9;--g200:#E2E8F0;--g300:#CBD5E1;
  --g400:#94A3B8;--g500:#64748B;--g600:#475569;--g700:#334155;
  --g800:#1E293B;--g900:#0F172A;
  --r:14px;--rs:8px;--rx:5px;
  --font:'Nunito',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-text-size-adjust:100%;text-size-adjust:100%;}
html,body{min-height:100%;background:#E8EDF8;}
body{
  font-family:var(--font);color:var(--g800);overflow-x:hidden;
  padding-left:env(safe-area-inset-left);
  padding-right:env(safe-area-inset-right);
}
#app{
  width:100%;
  max-width:540px;
  margin:0 auto;
  min-height:100vh;
  min-height:100dvh;
  background:#fff;
  position:relative;
}

/* SCREENS */
.screen{display:none;padding:max(14px,env(safe-area-inset-top)) 16px max(20px,env(safe-area-inset-bottom)) 16px;animation:fadeIn .25s ease;}
.screen.active{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{0%{transform:scale(1)}40%{transform:scale(1.15)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
@keyframes confettiDrop{from{transform:translateY(-10px) rotate(0deg);opacity:1}to{transform:translateY(90px) rotate(720deg);opacity:0}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}

/* HOME */
.home-hero{
  background:linear-gradient(135deg,#1E3A8A 0%,#2563EB 55%,#0EA5E9 100%);
  border-radius:var(--r);padding:22px 20px 18px;color:#fff;
  margin-bottom:18px;position:relative;overflow:hidden;
}
.home-hero::after{content:'';position:absolute;top:-50px;right:-50px;width:160px;height:160px;background:rgba(255,255,255,.07);border-radius:50%;}
.hero-title{font-size:28px;font-weight:900;letter-spacing:-.3px;position:relative;}
.hero-sub{font-size:13px;opacity:.8;margin:2px 0 14px;position:relative;}
.hero-chips{display:flex;gap:8px;flex-wrap:wrap;position:relative;}
.chip{background:rgba(255,255,255,.18);border-radius:20px;padding:5px 13px;font-size:12px;font-weight:700;}
.chip.xp{background:rgba(255,215,0,.25);color:#FDE68A;}

.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:18px;}
.stat-box{background:var(--g50);border:1.5px solid var(--g200);border-radius:var(--rs);padding:11px 8px;text-align:center;}
.stat-box.stat-clickable{
  cursor:pointer;transition:transform .12s,box-shadow .12s,border-color .12s;
  width:100%;font:inherit;color:inherit;display:block;text-align:center;
}
.stat-box.stat-clickable:hover{border-color:var(--blue-m);box-shadow:0 4px 14px rgba(37,99,235,.12);}
.stat-box.stat-clickable:active{transform:scale(.98);}
.stat-n{font-size:22px;font-weight:900;color:var(--g800);line-height:1;}
.stat-l{font-size:10px;color:var(--g400);margin-top:3px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;}
.stat-hint{font-size:9px;color:var(--blue);font-weight:700;margin-top:4px;}
.home-footer{margin-top:20px;padding-top:14px;border-top:1.5px solid var(--g200);text-align:center;}
.btn-reset{font-size:12px;font-weight:800;color:var(--g500);background:none;border:none;cursor:pointer;text-decoration:underline;font-family:var(--font);}
.btn-reset:hover{color:var(--red-d);}
.mistakes-intro{font-size:14px;color:var(--g600);line-height:1.65;margin-bottom:14px;}
.mistakes-actions{display:flex;flex-direction:column;gap:10px;margin-top:14px;}
.mistake-topic-row{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;background:#fff;border:2px solid var(--g200);border-radius:var(--r);padding:12px 14px;}
.mistake-topic-row .mt-name{font-size:14px;font-weight:800;color:var(--g800);}
.mistake-topic-row .mt-n{font-size:12px;color:var(--g500);}
.btn-small{padding:10px 14px;border-radius:var(--rs);border:2px solid var(--blue);background:var(--blue);color:#fff;font-family:var(--font);font-size:13px;font-weight:800;cursor:pointer;}
.btn-small.outline{background:#fff;color:var(--blue-d);}

.section-hd{font-size:11px;font-weight:800;color:var(--g400);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px;}
.topic-list{display:flex;flex-direction:column;gap:7px;}
.topic-btn{
  display:flex;align-items:center;gap:13px;
  background:#fff;border:2px solid var(--g200);border-radius:var(--r);
  padding:13px 14px;cursor:pointer;text-align:left;width:100%;
  transition:all .18s;position:relative;overflow:hidden;
}
.topic-btn:hover{transform:translateY(-2px);box-shadow:0 5px 18px rgba(37,99,235,.13);}
.topic-btn:hover{border-color:var(--blue);}
.topic-btn.mastered{border-color:var(--green-m);}
.topic-btn.mastered:hover{border-color:var(--green);}
.t-icon{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.t-right{flex:1;min-width:0;}
.t-name{font-size:15px;font-weight:800;color:var(--g800);margin-bottom:1px;}
.t-sub{font-size:12px;color:var(--g500);}
.t-row{display:flex;align-items:center;gap:6px;margin-top:5px;}
.badge{font-size:10px;font-weight:800;padding:2px 8px;border-radius:20px;letter-spacing:.02em;}
.badge-hot{background:#FEE2E2;color:#991B1B;}
.badge-new{background:var(--blue-l);color:var(--blue-d);}
.badge-ok{background:var(--green-l);color:var(--green-d);}
.t-progress{flex:1;height:4px;background:var(--g200);border-radius:2px;overflow:hidden;}
.t-progress-fill{height:100%;border-radius:2px;background:var(--green);transition:width .4s;}
.t-pct{font-size:11px;font-weight:700;color:var(--g400);}
.t-arrow{font-size:20px;color:var(--g300);flex-shrink:0;transition:all .18s;}
.topic-btn:hover .t-arrow{color:var(--blue);transform:translateX(3px);}

/* SHARED */
.screen-hdr{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
.btn-back{width:36px;height:36px;border:2px solid var(--g200);border-radius:var(--rs);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;transition:all .15s;flex-shrink:0;}
.btn-back:hover{border-color:var(--blue);background:var(--blue-l);}
.screen-title{font-size:17px;font-weight:800;color:var(--g800);}
.progress-track{display:flex;gap:4px;margin-bottom:16px;}
.pt-pip{flex:1;height:5px;border-radius:3px;background:var(--g200);transition:all .3s;}
.pt-pip.done{background:var(--green);}
.pt-pip.cur{background:var(--blue);animation:pulse 1.5s infinite;}

/* LESSON */
.lesson-card{background:#fff;border:2px solid var(--g200);border-radius:var(--r);padding:18px;margin-bottom:12px;}
.lesson-step-tag{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--g400);margin-bottom:8px;}
.lesson-h{font-size:17px;font-weight:900;color:var(--g900);margin-bottom:10px;}
.lesson-body{font-size:14px;line-height:1.8;color:var(--g600);}
.lesson-body strong{color:var(--g800);font-weight:800;}
.lesson-body em{color:var(--blue-d);font-style:normal;font-weight:700;}
.ex-box{background:var(--g50);border:1.5px solid var(--g200);border-radius:var(--rs);padding:13px;margin:10px 0;}
.ex-lbl{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--g400);margin-bottom:7px;}
.tip{background:var(--amber-l);border:1.5px solid var(--amber-m);border-radius:var(--rs);padding:11px 13px;font-size:13px;color:var(--amber-d);margin-top:10px;line-height:1.65;}
.tip strong{font-weight:800;}
.warn{background:var(--red-l);border:1.5px solid var(--red-m);border-radius:var(--rs);padding:11px 13px;font-size:13px;color:var(--red-d);margin-top:8px;line-height:1.65;}

/* Math display helpers */
.frac{display:inline-flex;flex-direction:column;align-items:center;line-height:1;vertical-align:middle;font-weight:800;font-size:22px;color:var(--g800);}
.fn{border-bottom:2.5px solid currentColor;padding:0 7px 2px;}
.fd{padding:2px 7px 0;}
.frac.green{color:var(--green-d);}
.frac.blue{color:var(--blue-d);}
.frac.red{color:var(--red-d);}
.math-row{display:flex;align-items:center;justify-content:center;gap:12px;padding:12px;font-size:20px;font-weight:800;color:var(--g500);}
.step-list{display:flex;flex-direction:column;gap:0;}
.step-item{display:flex;gap:11px;padding:9px 0;border-bottom:1px solid var(--g100);align-items:flex-start;}
.step-item:last-child{border-bottom:none;}
.step-circle{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:#fff;flex-shrink:0;margin-top:1px;}
.step-text{font-size:13px;line-height:1.65;color:var(--g600);}
.step-text strong{display:block;font-size:14px;font-weight:800;color:var(--g800);margin-bottom:1px;}
.kw-cloud{display:flex;flex-wrap:wrap;gap:6px;margin:6px 0;}
.kw{font-size:12px;font-weight:700;padding:4px 11px;border-radius:20px;}
.pv-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
.pv-table{width:100%;border-collapse:collapse;font-size:13px;min-width:320px;}
.pv-table th,.pv-table td{padding:8px 6px;border:1.5px solid var(--g200);text-align:center;}
.pv-table th{background:var(--g100);font-weight:800;color:var(--g600);}
.pv-table .dot-col{color:var(--blue);font-weight:900;font-size:17px;}
.geo-fig{text-align:center;padding:8px 0;}
.geo-fig svg{max-width:100%;height:auto;}
.formula-box{background:var(--blue-l);border:1.5px solid var(--blue-m);border-radius:var(--rs);padding:10px 14px;text-align:center;font-size:15px;font-weight:800;color:var(--blue-d);margin:8px 0;}
.data-tbl{width:100%;border-collapse:collapse;font-size:13px;}
.data-tbl th{background:var(--blue-l);color:var(--blue-d);font-weight:800;padding:8px 10px;border:1.5px solid var(--blue-m);}
.data-tbl td{padding:7px 10px;border:1.5px solid var(--g200);}
.data-tbl .total-row td{background:var(--green-l);font-weight:800;color:var(--green-d);}
.number-line{position:relative;height:50px;margin:10px 0;}
.nl-line{position:absolute;top:20px;left:10px;right:10px;height:2px;background:var(--g400);}
.nl-mark{position:absolute;top:12px;display:flex;flex-direction:column;align-items:center;}
.nl-tick{width:2px;height:16px;background:var(--g500);}
.nl-lbl{font-size:11px;font-weight:700;color:var(--g600);margin-top:2px;}
.nl-point{width:12px;height:12px;border-radius:50%;background:var(--red);border:2px solid var(--red-d);position:absolute;top:15px;}

.btn-main{width:100%;background:var(--blue);color:#fff;border:none;border-radius:var(--r);padding:14px;font-family:var(--font);font-size:16px;font-weight:800;cursor:pointer;transition:all .18s;margin-top:6px;}
.btn-main:hover{background:var(--blue-d);transform:translateY(-1px);box-shadow:0 4px 14px rgba(37,99,235,.3);}
.btn-main:disabled{background:var(--g300);cursor:default;transform:none;box-shadow:none;}
.btn-main.green{background:var(--green);}
.btn-main.green:hover{background:var(--green-d);}

/* QUIZ */
.quiz-top{background:var(--blue-l);border:2px solid var(--blue-m);border-radius:var(--r);padding:12px 15px;margin-bottom:14px;display:flex;flex-direction:column;gap:8px;}
.quiz-top-row{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;width:100%;}
.quiz-session-stats{font-size:12px;font-weight:700;color:var(--g600);line-height:1.45;padding-top:2px;border-top:1px solid var(--blue-m);}
.q-label{font-size:12px;font-weight:800;color:var(--blue-d);}
.q-xp{background:var(--blue);color:#fff;font-size:11px;font-weight:800;padding:3px 10px;border-radius:20px;}
.q-text{font-size:17px;font-weight:800;color:var(--g900);line-height:1.55;margin-bottom:16px;animation:slideIn .3s ease;}
.q-text .hint{font-size:13px;font-weight:400;color:var(--g500);display:block;margin-top:6px;font-style:italic;}
.opts{display:flex;flex-direction:column;gap:7px;}
.opt{
  background:#fff;border:2.5px solid var(--g200);border-radius:var(--rs);
  padding:13px 15px;cursor:pointer;font-size:14px;font-weight:700;
  color:var(--g700);text-align:left;transition:all .15s;
  display:flex;align-items:center;gap:12px;width:100%;
}
.opt:hover:not(:disabled){border-color:var(--blue);background:var(--blue-l);color:var(--blue-d);}
.opt-l{width:28px;height:28px;border-radius:50%;background:var(--g100);color:var(--g500);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0;transition:all .15s;}
.opt:hover:not(:disabled) .opt-l{background:var(--blue);color:#fff;}
.opt.correct{border-color:var(--green);background:var(--green-l);color:var(--green-d);animation:popIn .4s ease;}
.opt.correct .opt-l{background:var(--green);color:#fff;}
.opt.wrong{border-color:var(--red);background:var(--red-l);color:var(--red-d);animation:shake .4s ease;}
.opt.wrong .opt-l{background:var(--red);color:#fff;}
.opt.reveal{border-color:var(--green);background:var(--green-l);color:var(--green-d);}
.opt.reveal .opt-l{background:var(--green);color:#fff;}
.opts.opts-locked{pointer-events:none;}
.opt:disabled:not(.correct):not(.wrong):not(.reveal){opacity:.52;}
.opt.correct:disabled,.opt.wrong:disabled,.opt.reveal:disabled{opacity:1;}
.feedback{border-radius:var(--r);padding:14px 16px;margin:10px 0;animation:slideIn .3s ease;font-size:13px;line-height:1.7;}
.fb-ok{background:var(--green-l);border:2px solid var(--green-m);color:var(--green-d);}
.fb-ng{background:var(--red-l);border:2px solid var(--red-m);color:var(--red-d);}
.fb-title{font-size:15px;font-weight:900;margin-bottom:4px;}
.fb-explain{line-height:1.7;}
.fb-tip{margin-top:8px;padding-top:8px;border-top:1px solid rgba(0,0,0,.08);font-size:12px;opacity:.85;}
.weakness-alert{background:var(--amber-l);border:2px solid var(--amber-m);border-radius:var(--r);padding:13px 15px;margin:10px 0;font-size:13px;color:var(--amber-d);}
.weakness-alert strong{display:block;font-weight:800;margin-bottom:3px;}

/* SCRATCH PAD (quiz — draw work / notes) */
.scratch-pad{
  margin:14px 0 10px;
  background:var(--g50);
  border:1.5px solid var(--g200);
  border-radius:var(--r);
  overflow:hidden;
}
.scratch-pad-hd{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 12px;background:#fff;border-bottom:1.5px solid var(--g200);
}
.scratch-pad-title{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--g500);}
.btn-scratch-clear{
  font-family:var(--font);font-size:12px;font-weight:800;
  padding:6px 12px;border-radius:var(--rs);border:1.5px solid var(--g300);
  background:#fff;color:var(--g700);cursor:pointer;
}
.btn-scratch-clear:hover{border-color:var(--blue);color:var(--blue-d);background:var(--blue-l);}
#scratch-canvas{
  display:block;width:100%;height:200px;touch-action:none;cursor:crosshair;
  vertical-align:middle;
}

/* RESULT */
.result-ring{width:120px;height:120px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 16px;}
.ring-great{background:var(--green-l);border:4px solid var(--green);}
.ring-ok{background:var(--amber-l);border:4px solid var(--amber);}
.ring-low{background:var(--red-l);border:4px solid var(--red);}
.ring-n{font-size:32px;font-weight:900;line-height:1;}
.ring-s{font-size:11px;color:var(--g400);font-weight:700;}
.result-title{font-size:22px;font-weight:900;text-align:center;margin-bottom:5px;}
.result-msg{font-size:14px;color:var(--g500);text-align:center;line-height:1.65;margin-bottom:16px;}
.xp-box{background:var(--blue-l);border:2px solid var(--blue-m);border-radius:var(--r);padding:14px;text-align:center;margin-bottom:12px;}
.xp-n{font-size:26px;font-weight:900;color:var(--blue-d);}
.xp-s{font-size:12px;color:var(--g500);margin-top:2px;}
.breakdown{background:var(--g50);border:1.5px solid var(--g200);border-radius:var(--r);padding:13px;margin-bottom:12px;}
.bd-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:13px;border-bottom:1px solid var(--g100);}
.bd-row:last-child{border-bottom:none;}
.bd-k{color:var(--g600);}
.bd-v{font-weight:800;color:var(--g800);}
.bd-v.g{color:var(--green);}
.bd-v.r{color:var(--red);}
.weakness-section{background:var(--red-l);border:2px solid var(--red-m);border-radius:var(--r);padding:14px;margin-bottom:12px;}
.ws-title{font-size:13px;font-weight:800;color:var(--red-d);margin-bottom:8px;}
.ws-item{font-size:13px;color:var(--red-d);padding:4px 0;display:flex;align-items:flex-start;gap:8px;}
.ws-item::before{content:'▸';flex-shrink:0;}
.strength-section{background:var(--green-l);border:2px solid var(--green-m);border-radius:var(--r);padding:14px;margin-bottom:12px;}
.ss-title{font-size:13px;font-weight:800;color:var(--green-d);margin-bottom:8px;}
.ss-item{font-size:13px;color:var(--green-d);padding:4px 0;display:flex;align-items:flex-start;gap:8px;}
.ss-item::before{content:'✓';flex-shrink:0;}
details.lesson-details{background:var(--g50);border:1.5px solid var(--g200);border-radius:var(--rs);padding:10px 12px;margin:8px 0;font-size:13px;}
details.lesson-details summary{cursor:pointer;font-weight:800;color:var(--blue-d);list-style:none;}
details.lesson-details summary::-webkit-details-marker{display:none;}
.dotplot-svg{width:100%;max-width:340px;margin:8px auto;display:block;}
.hier-box{display:flex;flex-direction:column;align-items:center;gap:6px;padding:10px 0;}
.hier-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:center;font-size:12px;font-weight:700;color:var(--g700);}
.hier-arrow{color:var(--g400);font-size:16px;}
.unit-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:12px;margin-top:8px;}
.unit-cell{background:#fff;border:1.5px solid var(--g200);border-radius:var(--rs);padding:8px;text-align:center;}
.unit-cell strong{display:block;color:var(--blue-d);font-size:13px;}
.btn-row{display:flex;gap:8px;}
.btn-outline{flex:1;background:#fff;border:2px solid var(--g200);border-radius:var(--r);padding:12px;font-family:var(--font);font-size:14px;font-weight:800;cursor:pointer;color:var(--g700);transition:all .15s;}
.btn-outline:hover{border-color:var(--g400);background:var(--g50);}
.btn-primary{flex:1;background:var(--blue);border:none;border-radius:var(--r);padding:12px;font-family:var(--font);font-size:14px;font-weight:800;cursor:pointer;color:#fff;transition:all .15s;}
.btn-primary:hover{background:var(--blue-d);}

/* CONFETTI */
.confetti{position:fixed;pointer-events:none;z-index:9999;top:0;left:0;width:100%;height:100%;overflow:hidden;}
.cf-piece{position:absolute;top:-10px;width:9px;height:14px;border-radius:3px;animation:confettiDrop 1.2s ease-in forwards;}

/* RESPONSIVE — phones · tablets · laptops */
@media (min-width:480px){
  .hero-title{font-size:clamp(26px,4vw,32px);}
  .lesson-h{font-size:clamp(17px,2.2vw,20px);}
  .q-text{font-size:clamp(17px,2.2vw,19px);}
}
@media (min-width:600px){
  #app{
    max-width:min(600px,calc(100% - 32px));
    margin:12px auto;
    border-radius:18px;
    box-shadow:0 12px 48px rgba(15,23,42,.1);

    { skill:'Dot plot', q:`A dot plot shows books read: 0 books: 1 dot, 1 book: 2 dots, 2 books: 3 dots, 3 books: 1 dot, 4 books: 0 dots. What is the mode?`, opts:['0','1','2','3'], ans:2, exp:`The most dots (tallest stack) is at 2 books — mode = 2.`, skill_area:'Dot plots & frequency tables' },
    { skill:'Frequency', q:`A frequency table: Soccer 12, Basketball 9, Volleyball 7. How many students total?`, opts:['26','27','28','29'], ans:2, exp:`12 + 9 + 7 = 28 students.`, skill_area:'Dot plots & frequency tables' },
    { skill:'Dot plot', q:`From the lesson dot plot (hours 0–4), which value has the most responses?`, opts:['1 hour','2 hours','3 hours','4 hours'], ans:1, exp:`The tallest stack of dots is above 2 hours (3 dots).`, skill_area:'Dot plots & frequency tables' },
    { skill:'Stem plot', q:`Stem 6 | leaves 1, 4, 4, 9 — what is the range of this part of the data?`, opts:['8','13','10','9'], ans:0, exp:`Values 61, 64, 64, 69 → range = 69 − 61 = 8.`, skill_area:'Stem-and-leaf' },
    { skill:'Stem plot', q:`Stem-and-leaf: Stem 4 | 2 5 8  Stem 5 | 0 3 6. How many values?`, opts:['6','7','8','5'], ans:1, exp:`3 leaves on stem 4 + 3 on stem 5 = 6 values.`, skill_area:'Stem-and-leaf' },
    { skill:'Stem plot', q:`Data: 52, 58, 61, 63, 67, 71, 72. What is the median?`, opts:['61','63','62','67'], ans:1, exp:`7 values — the middle (4th) when ordered is 63.`, skill_area:'Stem-and-leaf' },
    { skill:'PFL', q:`Which pair is “good vs service”?`, opts:['Pizza / delivery fee','Water bottle / pizza','Shoes / shoes','Book / book'], ans:0, exp:`Pizza is a good; paying for delivery is paying for a service (bringing it).`, skill_area:'Personal financial literacy' }
  ]
}

}; // end TOPICS

</script>
<script>
// ============================================================
//  STAAR GRADE 5 MATH TRAINER — APP LOGIC
// ============================================================

const TOPIC_ORDER = ['fractions','decimals','wordproblems','geometry','data','rationals','algebraops','measurement','moneydata'];
const LETTERS = ['A','B','C','D'];
const STORAGE_KEY = 'staar_trainer_v3';

// ---- STATE ----
let G = {
  xp: 0,
  totalDone: 0,
  totalCorrect: 0,
  streak: 0,
  maxStreak: 0,
  topic: null,
  lesStep: 0,
  // quiz state
  qBank: [],          // shuffled questions for current session
  qBankTopicKeys: null, // parallel to qBank in "review" mode (which topic each question belongs to)
  qIdx: 0,
  qCorrect: 0,
  qWrong: 0,
  qAnswered: false,
  wrongSkills: [],    // track which skill_areas went wrong this session
  quizMode: 'normal', // 'normal' | 'review'
  reviewIsMixed: false,
  // per-topic best scores
  scores: {},         // { topicId: bestPct }
  attempts: {},       // { topicId: count }
  skillStats: {},     // { topicId: { skillArea: { c:0, w:0 } } }
  wrongQs: {}        // { topicId: [indices in topic.questions] }
};

// ---- PERSISTENCE ----
function saveState() {
  try {
    const saved = {
      xp: G.xp, totalDone: G.totalDone, totalCorrect: G.totalCorrect,
      streak: G.streak, maxStreak: G.maxStreak,
      scores: G.scores, attempts: G.attempts, skillStats: G.skillStats,
      wrongQs: G.wrongQs
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));
  } catch(e) {}
}

function loadState() {
  try {
    let raw = localStorage.getItem(STORAGE_KEY);
    let fromLegacy = false;
    if (!raw) {
      raw = localStorage.getItem('staar_trainer_v2');
      fromLegacy = !!raw;
    }
    if (!raw) return;
    const saved = JSON.parse(raw);
    Object.assign(G, saved);
    if (!G.wrongQs || typeof G.wrongQs !== 'object') G.wrongQs = {};
    if (fromLegacy) saveState();
  } catch(e) {}
}

function countMissedQuestions() {
  let n = 0;
  TOPIC_ORDER.forEach(k => {
    const a = G.wrongQs[k];
    if (a && a.length) n += a.length;
  });
  return n;
}

function addWrongQuestionIndex(topicKey, qIndex) {
  if (qIndex < 0) return;
  if (!G.wrongQs[topicKey]) G.wrongQs[topicKey] = [];
  if (!G.wrongQs[topicKey].includes(qIndex)) G.wrongQs[topicKey].push(qIndex);
}

function removeWrongQuestionIndex(topicKey, qIndex) {
  if (!G.wrongQs[topicKey]) return;
  G.wrongQs[topicKey] = G.wrongQs[topicKey].filter(i => i !== qIndex);
  if (G.wrongQs[topicKey].length === 0) delete G.wrongQs[topicKey];
}

function getTopicForCurrentQuestion() {
  if (G.quizMode === 'review' && G.qBankTopicKeys && G.qBankTopicKeys.length > G.qIdx) {
    return G.qBankTopicKeys[G.qIdx];
  }
  return G.topic;
}

function buildMistakeBank() {
  const bank = [];
  const keys = [];
  TOPIC_ORDER.forEach(topicKey => {
    const idxs = G.wrongQs[topicKey];
    if (!idxs || !idxs.length) return;
    idxs.forEach(idx => {
      const q = TOPICS[topicKey].questions[idx];
      if (q) {
        bank.push(q);
        keys.push(topicKey);
      }
    });
  });
  return { bank, keys };
}

function shufflePaired(bank, keys) {
  const pairs = bank.map((q, i) => ({ q, k: keys[i] }));
  for (let i = pairs.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pairs[i], pairs[j]] = [pairs[j], pairs[i]];
  }
  return {
    bank: pairs.map(p => p.q),
    keys: pairs.map(p => p.k)
  };
}

function resetAllProgress() {
  if (!confirm('Reset ALL progress (XP, streak, scores, missed list, and stats)? This cannot be undone.')) return;
  try {
    localStorage.removeItem(STORAGE_KEY);
    localStorage.removeItem('staar_trainer_v2');
  } catch(e) {}
  G.xp = 0;
  G.totalDone = 0;
  G.totalCorrect = 0;
  G.streak = 0;
  G.maxStreak = 0;
  G.scores = {};
  G.attempts = {};
  G.skillStats = {};
  G.wrongQs = {};
  saveState();
  goHome();
}

function openMistakesScreen() {
  const n = countMissedQuestions();
  const intro = document.getElementById('mistakes-intro');
  const wrap = document.getElementById('mistakes-by-topic');
  const btnAll = document.getElementById('btn-practice-all-missed');
  if (n === 0) {
    intro.textContent = 'You have no saved missed questions yet. When you get a question wrong in any topic quiz, it is saved here so you can practice it again.';
    wrap.innerHTML = '';
    btnAll.disabled = true;
    btnAll.style.opacity = '0.5';
  } else {
    intro.textContent = 'These are questions you answered wrong at least once. Practice by topic or all together.';
    btnAll.disabled = false;
    btnAll.style.opacity = '1';
    let html = '';
    TOPIC_ORDER.forEach(key => {
      const idxs = G.wrongQs[key];
      if (!idxs || !idxs.length) return;
      const t = TOPICS[key];
      html += `<div class="mistake-topic-row">
        <div><div class="mt-name">${t.emoji} ${t.name}</div><div class="mt-n">${idxs.length} question${idxs.length === 1 ? '' : 's'}</div></div>
        <button type="button" class="btn-small" data-topic-review="${key}">Practice</button>
      </div>`;
    });
    wrap.innerHTML = html;
    wrap.querySelectorAll('[data-topic-review]').forEach(btn => {
      btn.onclick = () => startTopicReviewQuiz(btn.getAttribute('data-topic-review'));
    });
  }
  showScreen('mistakes-scr');
}

function startReviewQuizFromBank() {
  const { bank, keys } = buildMistakeBank();
  if (bank.length === 0) {
    alert('No missed questions to practice.');
    return;
  }
  G.quizMode = 'review';
  G.reviewIsMixed = true;
  G.topic = TOPIC_ORDER[0];
  const shuffled = shufflePaired(bank, keys);
  G.qBank = shuffled.bank;
  G.qBankTopicKeys = shuffled.keys;
  G.qIdx = 0;
  G.qCorrect = 0;
  G.qWrong = 0;
  G.qAnswered = false;
  G.wrongSkills = [];
  document.getElementById('quiz-title').textContent = 'Missed questions — Review';
  makePipTrack('quiz-track', G.qBank.length, 0);
  renderQuestion();
  showScreen('quiz-scr');
}

function startTopicReviewQuiz(topicKey) {
  const idxs = G.wrongQs[topicKey];
  if (!idxs || !idxs.length) return;
  G.quizMode = 'review';
  G.reviewIsMixed = false;
  G.topic = topicKey;
  const bank = idxs.map(idx => TOPICS[topicKey].questions[idx]);
  const keys = idxs.map(() => topicKey);
  const shuffled = shufflePaired(bank, keys);
  G.qBank = shuffled.bank;
  G.qBankTopicKeys = shuffled.keys;
  G.qIdx = 0;
  G.qCorrect = 0;
  G.qWrong = 0;
  G.qAnswered = false;
  G.wrongSkills = [];
  document.getElementById('quiz-title').textContent = TOPICS[topicKey].name + ' — Missed';
  makePipTrack('quiz-track', G.qBank.length, 0);
  renderQuestion();
  showScreen('quiz-scr');
}

// ---- SCREEN CONTROL ----
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

function goHome() {
  showScreen('home');
  updateHomeUI();
  buildTopicList();
}

function confirmLeave() {
  if (G.qIdx > 0 && G.qAnswered === false) {
    if (!confirm('Leave quiz? Your progress this round will be lost.')) return;
  }
  goHome();
}

// ---- HOME UI ----
function updateHomeUI() {
  const acc = G.totalDone > 0 ? Math.round(G.totalCorrect / G.totalDone * 100) : 0;
  const level = Math.floor(G.xp / 100) + 1;
  const mastered = TOPIC_ORDER.filter(k => (G.scores[k] || 0) >= 80).length;

  document.getElementById('xp-chip').textContent = G.xp + ' XP';
  document.getElementById('streak-chip').textContent = '🔥 ' + G.streak + ' streak';
  document.getElementById('level-chip').textContent = 'Level ' + level;
  document.getElementById('sh-done').textContent = G.totalDone;
  document.getElementById('sh-correct').textContent = G.totalCorrect;
  document.getElementById('sh-acc').textContent = G.totalDone > 0 ? acc + '%' : '—';
  document.getElementById('sh-mastered').textContent = mastered + '/' + TOPIC_ORDER.length;
  const missed = countMissedQuestions();
  const hint = document.getElementById('sh-done-hint');
  if (hint) hint.textContent = missed ? ('Tap → ' + missed + ' missed') : 'Tap → missed';
}

function buildTopicList() {
  const container = document.getElementById('topic-list');
  container.innerHTML = '';
  TOPIC_ORDER.forEach(key => {
    const t = TOPICS[key];
    const bestPct = G.scores[key] != null ? G.scores[key] : null;
    const attempts = G.attempts[key] || 0;
    const mastered = bestPct != null && bestPct >= 80;
    const isMastered = mastered;

    // Build progress bar fill
    const fillPct = bestPct != null ? bestPct : 0;

    // Badge logic
    let badgeTxt = t.badge;
    let badgeCls = t.badgeClass;
    if (bestPct != null) {
      if (bestPct >= 80) { badgeTxt = 'Mastered ✓'; badgeCls = 'badge-ok'; }
      else { badgeTxt = bestPct + '% best'; badgeCls = 'badge-new'; }
    }

    const subText = attempts === 0
      ? t.desc
      : `${attempts} attempt${attempts>1?'s':''} · ${t.questions.length} questions`;

    const btn = document.createElement('button');
    btn.className = 'topic-btn' + (isMastered ? ' mastered' : '');
    btn.onclick = () => startTopic(key);
    btn.innerHTML = `
      <div class="t-icon" style="background:${t.bg}">${t.emoji}</div>
      <div class="t-right">
        <div class="t-name">${t.name}</div>
        <div class="t-sub">${subText}</div>
        <div class="t-row">
          <span class="badge ${badgeCls}">${badgeTxt}</span>
          <div class="t-progress">
            <div class="t-progress-fill" style="width:${fillPct}%"></div>
          </div>
          <span class="t-pct">${bestPct != null ? bestPct+'%' : ''}</span>
        </div>
      </div>
      <div class="t-arrow">›</div>`;
    container.appendChild(btn);
  });
}

// ---- LESSON ----
function startTopic(key) {
  G.topic = key;
  G.lesStep = 0;
  showLessonStep();
}

function makePipTrack(containerId, n, activeIdx) {
  const el = document.getElementById(containerId);
  el.innerHTML = '';
  for (let i = 0; i < n; i++) {
    const pip = document.createElement('div');
    pip.className = 'pt-pip' + (i < activeIdx ? ' done' : i === activeIdx ? ' cur' : '');
    el.appendChild(pip);
  }
}

function showLessonStep() {
  const t = TOPICS[G.topic];
  document.getElementById('les-title').textContent = t.name + ' — Lesson';
  const totalSteps = t.lessons.length;
  makePipTrack('les-track', totalSteps, G.lesStep);
  const step = t.lessons[G.lesStep];
  document.getElementById('les-body').innerHTML = step.render();
  const btn = document.getElementById('les-btn');
  const isLast = G.lesStep >= totalSteps - 1;
  btn.textContent = isLast ? "Start Practice Quiz →" : "Next lesson →";
  showScreen('lesson-scr');
}

function lessonNext() {
  const t = TOPICS[G.topic];
  G.lesStep++;
  if (G.lesStep >= t.lessons.length) {
    startQuiz();
  } else {
    showLessonStep();
  }
}

// ---- QUIZ ----
function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz() {
  G.quizMode = 'normal';
  G.reviewIsMixed = false;
  G.qBankTopicKeys = null;
  const t = TOPICS[G.topic];
  G.qBank = shuffleArray(t.questions);
  G.qIdx = 0;
  G.qCorrect = 0;
  G.qWrong = 0;
  G.qAnswered = false;
  G.wrongSkills = [];

  G.attempts[G.topic] = (G.attempts[G.topic] || 0) + 1;

  document.getElementById('quiz-title').textContent = t.name + ' — Practice';
  makePipTrack('quiz-track', G.qBank.length, 0);
  renderQuestion();
  showScreen('quiz-scr');
}

function updateQuizProgressLine() {
  const el = document.getElementById('quiz-session-stats');
  if (!el) return;
  const total = G.qBank.length;
  if (G.qAnswered) {
    const completed = G.qIdx + 1;
    const c = G.qCorrect;
    const w = completed - c;
    el.textContent =
      'This round: ' + completed + '/' + total + ' answered · ' + c + ' correct · ' + w + ' wrong';
  } else {
    const done = G.qIdx;
    if (done === 0) {
      el.textContent =
        'Tap one answer — your choice locks in (you cannot change it).';
    } else {
      const c = G.qCorrect;
      const w = done - c;
      el.textContent =
        'So far: ' + done + '/' + total + ' answered · ' + c + ' correct · ' + w + ' wrong';
    }
  }
}

function renderQuestion() {
  const q = G.qBank[G.qIdx];
  G.qAnswered = false;

  document.getElementById('q-label').textContent =
    'Question ' + (G.qIdx + 1) + ' of ' + G.qBank.length;
  document.getElementById('q-text').textContent = q.q;
  document.getElementById('q-fb').innerHTML = '';
  document.getElementById('q-next').disabled = true;
  document.getElementById('q-next').textContent =
    G.qIdx < G.qBank.length - 1 ? 'Next question →' : 'See results →';

  const optsEl = document.getElementById('q-opts');
  optsEl.innerHTML = '';
  optsEl.classList.remove('opts-locked');
  q.opts.forEach((o, i) => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'opt';
    btn.innerHTML = `<span class="opt-l">${LETTERS[i]}</span>${o}`;
    btn.addEventListener('click', () => selectAnswer(i), { once: true });
    optsEl.appendChild(btn);
  });

  makePipTrack('quiz-track', G.qBank.length, G.qIdx);
  updateQuizProgressLine();
  initScratchPad();
  fitScratchCanvas();
  requestAnimationFrame(function () {
    requestAnimationFrame(fitScratchCanvas);
  });
}

function selectAnswer(idx) {
  if (G.qAnswered) return;
  G.qAnswered = true;

  const optsWrap = document.getElementById('q-opts');
  if (optsWrap) {
    optsWrap.classList.add('opts-locked');
    optsWrap.querySelectorAll('.opt').forEach(b => {
      b.disabled = true;
      b.setAttribute('aria-disabled', 'true');
    });
  }

  const q = G.qBank[G.qIdx];
  const correct = idx === q.ans;
  const topicKey = getTopicForCurrentQuestion();
  const tObj = TOPICS[topicKey];
  const qIndexInTopic = tObj ? tObj.questions.indexOf(q) : -1;

  // Style the options
  const btns = document.querySelectorAll('.opt');
  btns.forEach((b, i) => {
    if (i === idx && correct) b.classList.add('correct');
    else if (i === idx && !correct) b.classList.add('wrong');
    if (i === q.ans && !correct) b.classList.add('reveal');
  });

  if (correct) {
    if (qIndexInTopic >= 0) removeWrongQuestionIndex(topicKey, qIndexInTopic);
  } else {
    if (qIndexInTopic >= 0) addWrongQuestionIndex(topicKey, qIndexInTopic);
  }

  // Update global stats
  G.totalDone++;
  if (correct) {
    G.totalCorrect++;
    G.qCorrect++;
    G.streak++;
    G.maxStreak = Math.max(G.maxStreak, G.streak);
    G.xp += 10;
    if (G.streak >= 5 && G.streak % 5 === 0) launchConfetti();
  } else {
    G.streak = 0;
    G.qWrong++;
    G.wrongSkills.push(q.skill_area);
  }

  // Track skill stats per topic
  if (!G.skillStats[topicKey]) G.skillStats[topicKey] = {};
  const sa = q.skill_area;
  if (!G.skillStats[topicKey][sa]) G.skillStats[topicKey][sa] = { c: 0, w: 0 };
  G.skillStats[topicKey][sa][correct ? 'c' : 'w']++;

  saveState();

  // Build feedback
  const fbEl = document.getElementById('q-fb');
  let fbHtml = `<div class="feedback ${correct ? 'fb-ok' : 'fb-ng'}">
    <div class="fb-title">${correct ? '✅ Correct! +10 XP' : '❌ Not quite — let\'s learn from this'}</div>
    <div class="fb-explain">${q.exp}</div>`;

  // Add skill-specific tip if wrong
  if (!correct) {
    const tipMap = {
      'Equivalent fractions': 'Tip: Cross-multiply to check equivalence. a/b = c/d if a×d = b×c.',
      'Adding unlike denominators': 'Tip: Always find the LCD first. Convert both fractions, THEN add numerators.',
      'Subtracting unlike denominators': 'Tip: LCD first, convert, then subtract numerators. Never subtract denominators.',
      'Multiplying fractions': 'Tip: Multiply top × top, bottom × bottom. Simplify by finding GCF.',
      'Fraction of a whole number': 'Tip: "Fraction OF a number" = multiply. Divide by denominator, then multiply by numerator.',
      'Place value': 'Tip: Tenths=0.1, Hundredths=0.01, Thousandths=0.001. Count places from the decimal point.',
      'Adding decimals': 'Tip: Line up decimal points first. Add zeros as placeholders so columns match.',
      'Subtracting decimals': 'Tip: Line up decimal points. Regroup from left to right if needed.',
      'Multiplying decimals': 'Tip: Multiply as whole numbers, then count total decimal places for placement.',
      'Dividing decimals': 'Tip: Make the divisor a whole number by moving its decimal, then move the dividend the same amount.',
      'Multi-step problems': 'Tip: Identify ALL the steps before solving. Highlight each question, then solve in order.',
      'Rate problems': 'Tip: Rate × Time = Distance (or Amount). Identify what you know and what you need.',
      'Area of rectangles': 'Tip: Area = length × width. Always use square units (cm², ft², in²).',
      'Area of triangles': 'Tip: Area = (base × height) ÷ 2. The height must be perpendicular to the base.',
      'Perimeter': 'Tip: Add ALL sides together. For rectangles: P = 2l + 2w.',
      'Volume': 'Tip: V = l × w × h for rectangular prisms. Unit is always cubic (in³, cm³, ft³).',
      'Coordinate plane': 'Tip: Ordered pairs are (x, y). Go right/left first (x), then up/down (y).',
      'Mean': 'Tip: Mean = sum of all values ÷ number of values. It\'s the "fair share" amount.',
      'Median': 'Tip: ALWAYS sort first! Then find the middle. For even count: average the two middle values.',
      'Mode': 'Tip: Mode = most frequent value. A data set can have no mode, one mode, or multiple modes.',
      'Range': 'Tip: Range = maximum − minimum. It measures the spread of the data.',
      'Mixed vs improper': 'Tip: Multiply whole × denominator, add numerator for mixed→improper. Divide, remainder→fraction for improper→mixed.',
      'Compare & order rationals': 'Tip: Change everything to decimals or use common denominators, then compare place by place.',
      'Number line placement': 'Tip: Divide numerator by denominator to see which whole numbers the fraction sits between.',
      'Order of operations': 'Tip: Parentheses first. Then multiply/divide left to right, then add/subtract left to right.',
      'Long division': 'Tip: Estimate first. Multiply divisor × quotient to check. Remainder must be less than divisor.',
      'Multi-digit multiply': 'Tip: Align by place value. Add partial products carefully.',
      'Patterns': 'Tip: Write the first several terms in a table — compare the same position in two different rules.',
      'Equations with variables': 'Tip: Undo operations in reverse — add/subtract first, then multiply/divide both sides.',
      'Customary & metric conversion': 'Tip: Multiply when going to a smaller unit; divide when going to a larger unit.',
      'Quadrilateral hierarchy': 'Tip: List properties (parallel sides, right angles, equal sides) — more properties means more specific shape.',
      'Irregular perimeter': 'Tip: Trace the outside once and add every segment — no double-counting inside edges.',
      'Personal financial literacy': 'Tip: Income − expenses = what’s left. Debit spends now; credit borrows for later.',
      'Dot plots & frequency tables': 'Tip: Each dot is one item. Tallest stack = mode. Sum of counts = total.',
      'Stem-and-leaf': 'Tip: Read stem+leaf as one number. Sort leaves mentally to find median.'
    };
    const tip = tipMap[q.skill_area];
    if (tip) fbHtml += `<div class="fb-tip">📌 ${tip}</div>`;
  }
  fbHtml += `</div>`;

  // If this was a hard question and they got it wrong, show a weakness note
  if (!correct && G.wrongSkills.filter(s => s === q.skill_area).length >= 2) {
    fbHtml += `<div class="weakness-alert"><strong>⚠️ Focus area detected: ${q.skill_area}</strong>You've missed multiple questions on this skill. Review the lesson on this topic!</div>`;
  }

  fbEl.innerHTML = fbHtml;
  updateQuizProgressLine();
  document.getElementById('q-next').disabled = false;
}

function nextQ() {
  G.qIdx++;
  if (G.qIdx >= G.qBank.length) {
    showResult();
  } else {
    renderQuestion();
  }
}

// ---- RESULT SCREEN ----
function showResult() {
  const isReview = G.quizMode === 'review';
  const t = isReview
    ? (G.reviewIsMixed
        ? { name: 'Missed questions', emoji: '📌' }
        : TOPICS[G.topic])
    : TOPICS[G.topic];
  const total = G.qBank.length;
  const pct = Math.round(G.qCorrect / total * 100);

  let prevBest = 0;
  if (!isReview) {
    prevBest = G.scores[G.topic] || 0;
    if (pct > prevBest) G.scores[G.topic] = pct;
  }

  // Bonus XP
  const bonus = pct >= 90 ? 50 : pct >= 80 ? 30 : pct >= 60 ? 15 : 5;
  G.xp += bonus;
  saveState();

  // Ring color
  const ring = document.getElementById('r-ring');
  ring.className = 'result-ring ' + (pct >= 80 ? 'ring-great' : pct >= 60 ? 'ring-ok' : 'ring-low');
  document.getElementById('r-pct').textContent = pct + '%';
  document.getElementById('r-stars').textContent = pct >= 90 ? '⭐⭐⭐' : pct >= 75 ? '⭐⭐' : '⭐';
  document.getElementById('r-title').textContent =
    pct >= 90 ? 'Outstanding!' : pct >= 80 ? 'Excellent work!' : pct >= 60 ? 'Good effort!' : 'Keep practicing!';
  document.getElementById('r-msg').textContent = isReview
    ? (G.qCorrect + ' of ' + total + ' correct. ' +
        (pct === 100
          ? 'Great — those questions are removed from your missed list when you get them right!'
          : 'Keep practicing missed questions until you clear them.'))
    : (G.qCorrect + ' of ' + total + ' correct. ' +
        (pct >= 80
          ? 'You\'ve mastered this topic! Try another one.'
          : pct >= 60
          ? 'Review the lessons and try again to improve your score.'
          : 'Go back through the lessons carefully, then retry. You can do this!'));

  document.getElementById('r-xp-n').textContent = '+' + bonus + ' bonus XP!';
  document.getElementById('r-xp-s').textContent =
    'Total XP: ' + G.xp + (!isReview && pct > prevBest ? ' · New personal best!' : '');

  const pbRow = isReview
    ? '<div class="bd-row"><span class="bd-k">Personal best</span><span class="bd-v">—</span></div>'
    : '<div class="bd-row"><span class="bd-k">Personal best</span><span class="bd-v">' + (G.scores[G.topic] || 0) + '%</span></div>';

  document.getElementById('r-bd').innerHTML =
    '<div class="bd-row"><span class="bd-k">Topic</span><span class="bd-v">' + t.emoji + ' ' + t.name + '</span></div>' +
    pbRow +
    '<div class="bd-row"><span class="bd-k">Questions answered</span><span class="bd-v">' + total + '</span></div>' +
    '<div class="bd-row"><span class="bd-k">Correct</span><span class="bd-v g">' + G.qCorrect + '</span></div>' +
    '<div class="bd-row"><span class="bd-k">Incorrect</span><span class="bd-v ' + (G.qWrong > 0 ? 'r' : '') + '">' + G.qWrong + '</span></div>' +
    '<div class="bd-row"><span class="bd-k">Score this round</span><span class="bd-v">' + pct + '%</span></div>';

  // Weakness analysis
  const weakEl = document.getElementById('r-weak');
  const strongEl = document.getElementById('r-strong');
  weakEl.innerHTML = '';
  strongEl.innerHTML = '';

  // Unique wrong skills
  const uniqueWrong = [...new Set(G.wrongSkills)];
  if (uniqueWrong.length > 0) {
    const items = uniqueWrong.map(s => `<div class="ws-item">${s} — needs practice</div>`).join('');
    weakEl.innerHTML = `<div class="weakness-section"><div class="ws-title">🎯 Focus areas to review:</div>${items}</div>`;
  }

  // Strong skills (got right, no wrong answers on that skill this session)
  const rightSkills = G.qBank
    .filter((_, i) => {
      // We need to track which questions were right
      // Use skill stats: if correct count increased for this skill
      return true;
    })
    .map(q => q.skill_area);

  const strongSkills = [...new Set(rightSkills)].filter(s => !uniqueWrong.includes(s));
  if (strongSkills.length > 0) {
    const items = strongSkills.slice(0, 3).map(s => `<div class="ss-item">${s}</div>`).join('');
    strongEl.innerHTML = `<div class="strength-section"><div class="ss-title">💪 Strengths this round:</div>${items}</div>`;
  }

  if (pct >= 80) launchConfetti();
  showScreen('result-scr');
}

function retryTopic() {
  if (G.quizMode === 'review') {
    if (G.reviewIsMixed) startReviewQuizFromBank();
    else startTopicReviewQuiz(G.topic);
    return;
  }
  G.lesStep = 0;
  showLessonStep();
}

// ---- SCRATCH PAD (finger, Apple Pencil, mouse) ----
let scratchPadBound = false;
let scratchDrawing = false;

function fitScratchCanvas() {
  const canvas = document.getElementById('scratch-canvas');
  const wrap = document.getElementById('scratch-pad-wrap');
  if (!canvas || !wrap) return;
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const w = Math.max(1, Math.floor(wrap.clientWidth));
  const cssH = 200;
  canvas.style.width = w + 'px';
  canvas.style.height = cssH + 'px';
  canvas.width = Math.floor(w * dpr);
  canvas.height = Math.floor(cssH * dpr);
  const ctx = canvas.getContext('2d');
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.scale(dpr, dpr);
  ctx.fillStyle = '#fffef8';
  ctx.fillRect(0, 0, w, cssH);
  ctx.strokeStyle = 'rgba(148,163,184,0.28)';
  ctx.lineWidth = 1;
  for (let y = 24; y < cssH; y += 24) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(w, y);
    ctx.stroke();
  }
  ctx.strokeStyle = '#1e293b';
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.lineWidth = 2.5;
}

function scratchPointerPos(e, canvas) {
  const rect = canvas.getBoundingClientRect();
  return { x: e.clientX - rect.left, y: e.clientY - rect.top };
}

function initScratchPad() {
  const canvas = document.getElementById('scratch-canvas');
  if (!canvas || scratchPadBound) return;
  scratchPadBound = true;

  const ctx = () => canvas.getContext('2d');

  canvas.addEventListener('pointerdown', function (e) {
    if (e.pointerType === 'mouse' && e.button !== 0) return;
    scratchDrawing = true;
    try {
      canvas.setPointerCapture(e.pointerId);
    } catch (err) {}
    const c = ctx();
    const pr = e.pressure != null && e.pressure > 0 ? e.pressure : 0.5;
    c.lineWidth = Math.max(1.2, 1.5 + pr * 3);
    const p = scratchPointerPos(e, canvas);
    c.beginPath();
    c.moveTo(p.x, p.y);
  });

  canvas.addEventListener('pointermove', function (e) {
    if (!scratchDrawing) return;
    const c = ctx();
    const pr = e.pressure != null && e.pressure > 0 ? e.pressure : 0.5;
    c.lineWidth = Math.max(1.2, 1.5 + pr * 3);
    const p = scratchPointerPos(e, canvas);
    c.lineTo(p.x, p.y);
    c.stroke();
    c.beginPath();
    c.moveTo(p.x, p.y);
  });

  function endDraw(e) {
    if (!scratchDrawing) return;
    scratchDrawing = false;
    try {
      canvas.releasePointerCapture(e.pointerId);
    } catch (err) {}
  }

  canvas.addEventListener('pointerup', endDraw);
  canvas.addEventListener('pointercancel', endDraw);

  const clearBtn = document.getElementById('btn-scratch-clear');
  if (clearBtn) {
    clearBtn.onclick = function () {
      fitScratchCanvas();
    };
  }

  let resizeT;
  window.addEventListener('resize', function () {
    clearTimeout(resizeT);
    resizeT = setTimeout(function () {
      const quiz = document.getElementById('quiz-scr');
      if (quiz && quiz.classList.contains('active')) fitScratchCanvas();
    }, 200);
  });
}

// ---- CONFETTI ----
function launchConfetti() {
  const colors = ['#2563EB','#16A34A','#D97706','#7C3AED','#DC2626','#0D9488','#F59E0B'];
  const layer = document.getElementById('confetti-layer');
  for (let i = 0; i < 24; i++) {
    const el = document.createElement('div');
    el.className = 'cf-piece';
    el.style.cssText = `
      left:${5 + Math.random() * 90}%;
      background:${colors[Math.floor(Math.random() * colors.length)]};
      animation-delay:${Math.random() * 0.6}s;
      animation-duration:${0.9 + Math.random() * 0.7}s;
      transform:rotate(${Math.random() * 360}deg);
      opacity:1;`;
    layer.appendChild(el);
    setTimeout(() => el.remove(), 2000);
  }
}

// ---- INIT ----
(function init() {
  loadState();
  updateHomeUI();
  buildTopicList();
  const doneBtn = document.getElementById('stat-done-btn');
  if (doneBtn) doneBtn.onclick = openMistakesScreen;
  const resetBtn = document.getElementById('btn-reset-all');
  if (resetBtn) resetBtn.onclick = resetAllProgress;
  const allMissed = document.getElementById('btn-practice-all-missed');
  if (allMissed) allMissed.onclick = startReviewQuizFromBank;
  initScratchPad();
})();
